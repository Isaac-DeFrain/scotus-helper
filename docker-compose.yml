x-common-env: &common-env
  NPM_CONFIG_UPDATE_NOTIFIER: "false"
  NPM_CONFIG_TELEMETRY: "false"
  NEXT_TELEMETRY_DISABLED: "1"

services:
  # The Weaviate vector database.
  weaviate:
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.37.2
    ports:
      - 8080:8080
      - 50051:50051
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: unless-stopped
    depends_on:
      scrape:
        condition: service_completed_successfully
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      CLUSTER_HOSTNAME: "weaviate"
    healthcheck:
      test:
        ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # The service that scrapes the SCOTUS website and uploads the opinions to Weaviate.
  scrape:
    build:
      context: .
      dockerfile: Dockerfile.cron
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    env_file:
      - .env
    environment:
      <<: *common-env
    volumes:
      - ./data:/app/data
    entrypoint: ["npm", "run", "scrape-opinions", "--", "--all"]
    restart: on-failure

  # The service that uploads the opinions to Weaviate.
  upload:
    build:
      context: .
      dockerfile: Dockerfile.cron
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    depends_on:
      weaviate:
        condition: service_healthy
      scrape:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      <<: *common-env
      WEAVIATE_URL: http://weaviate:8080
    volumes:
      - ./data:/app/data
    entrypoint: ["npm", "run", "upload-opinions"]
    restart: on-failure

  # The web application.
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      weaviate:
        condition: service_healthy
      upload:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      <<: *common-env
      WEAVIATE_URL: http://weaviate:8080
      CHAT_DB_PATH: /app/chat-data/chat.db
    restart: unless-stopped
    volumes:
      - ./data:/app/data:ro
      - chat_data:/app/chat-data

  # The service that runs the cron jobs.
  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    user: root
    depends_on:
      weaviate:
        condition: service_healthy
    env_file:
      - .env
    environment:
      <<: *common-env
      WEAVIATE_URL: http://weaviate:8080
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # The reverse proxy - sole HTTP entrypoint in dev.
  nginx:
    image: nginx:1.31-alpine
    volumes:
      - ./nginx/dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/entrypoint.d:/docker-entrypoint.d/custom:ro
    ports:
      - 80:80
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

# Named volumes for Weaviate and chat analytics (app writes chat.db here).
volumes:
  weaviate_data:
  chat_data:
