services:
  weaviate:
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.37.2
    ports:
      - 8080:8080
      - 50051:50051
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: unless-stopped
    depends_on:
      scrape:
        condition: service_completed_successfully
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      CLUSTER_HOSTNAME: "weaviate"
    healthcheck:
      test:
        ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  scrape:
    build:
      context: .
      dockerfile: Dockerfile.cron
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    env_file:
      - .env
    environment:
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
      NPM_CONFIG_TELEMETRY: "false"
    volumes:
      - ./data:/app/data
    entrypoint: ["npm", "run", "scrape-opinions", "--", "--all"]
    restart: "no"

  upload:
    build:
      context: .
      dockerfile: Dockerfile.cron
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    depends_on:
      weaviate:
        condition: service_healthy
      scrape:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      WEAVIATE_URL: http://weaviate:8080
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
      NPM_CONFIG_TELEMETRY: "false"
    volumes:
      - ./data:/app/data
    entrypoint: ["npm", "run", "upload-opinions"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    depends_on:
      weaviate:
        condition: service_healthy
      upload:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      WEAVIATE_URL: http://weaviate:8080
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
      NPM_CONFIG_TELEMETRY: "false"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./data:/app/data

  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    user: root
    depends_on:
      weaviate:
        condition: service_healthy
    env_file:
      - .env
    environment:
      WEAVIATE_URL: http://weaviate:8080
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
      NPM_CONFIG_TELEMETRY: "false"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  weaviate_data:
