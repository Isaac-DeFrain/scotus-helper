services:
  weaviate:
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.37.2
    ports:
      - 8080:8080
      - 50051:50051
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: on-failure:0
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    depends_on:
      weaviate:
        condition: service_healthy
    env_file:
      - .env
    environment:
      WEAVIATE_URL: ${WEAVIATE_URL:-http://weaviate:8080}
    volumes:
      - ./data:/app/data

  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    depends_on:
      weaviate:
        condition: service_healthy
    env_file:
      - .env
    environment:
      WEAVIATE_URL: ${WEAVIATE_URL:-http://weaviate:8080}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  weaviate_data:
