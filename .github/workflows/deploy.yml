name: Deploy

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > vps_key.pem
          chmod 0600 vps_key.pem

      - name: Prepare known_hosts
        run: |
          mkdir ~/.ssh/ && touch ~/.ssh/known_hosts
          echo "${{ secrets.VPS_SSH_HOST_KEYS }}" | base64 -d >> ~/.ssh/known_hosts

      - name: Start deployment of the latest version in the background
        env:
          VPS_SSH_USERNAME: ${{ secrets.VPS_SSH_USERNAME }}
          VPS_IP: ${{ secrets.VPS_IP }}
        run: ./scripts/prod/deploy.sh
